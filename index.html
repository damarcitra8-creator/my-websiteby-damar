<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hand Tracking Neon Box</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0f19; }
        canvas { display: block; }
        /* Efek Glow Neon untuk UI */
        .neon-glow { text-shadow: 0 0 10px rgba(74, 222, 128, 0.8); }
    </style>
</head>
<body class="relative w-screen h-screen text-white font-sans">

    <div class="absolute top-5 right-5 bg-slate-900/80 px-4 py-2 rounded-full border border-green-500/50 flex items-center gap-2 z-10">
        <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
        <span id="status-text" class="text-sm font-semibold neon-glow text-green-400">0 TANGAN TERDETEKSI</span>
    </div>

    <div class="absolute left-5 top-1/2 -translate-y-1/2 bg-slate-950/60 p-4 rounded-2xl border border-slate-800 backdrop-blur-md flex flex-col gap-4 z-10 w-20 items-center">
        <div class="text-xs text-slate-400 font-bold mb-2">BOX</div>
        <button class="w-12 h-12 bg-blue-600 rounded-xl border-2 border-transparent hover:border-white transition"></button>
        <button class="w-12 h-12 bg-purple-500 rounded-xl border-2 border-transparent hover:border-white transition"></button>
        <button class="w-12 h-12 bg-orange-500 rounded-xl border-2 border-transparent hover:border-white transition"></button>
        <button class="w-12 h-12 bg-rose-950 rounded-xl border-2 border-transparent hover:border-white transition"></button>
    </div>

    <video id="webcam" class="absolute bottom-5 right-5 w-60 rounded-xl border-2 border-slate-700 mirrored z-10 transform scale-x-[-1]" autoplay playsinline></video>

    <div id="canvas-container" class="w-full h-full"></div>

    <script>
        const videoElement = document.getElementById('webcam');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        // --- SETUP THREE.JS (Dunia 3D) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0b0f19, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Grid Lantai 3D
        const gridHelper = new THREE.GridHelper(20, 20, 0x1e293b, 0x0f172a);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // Pencahayaan
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00ffff, 1, 100);
        pointLight.position.set(0, 10, 5);
        scene.add(pointLight);

        // Objek 1: Kubus 3D
        const cubeGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const cubeMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.2 });
        const cube = new THREE.Mesh(cubeGeo, cubeMat);
        cube.position.set(-2, 2, 0);
        scene.add(cube);

        // Objek 2: Silinder 3D
        const cylGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.5, 32);
        const cylMat = new THREE.MeshStandardMaterial({ color: 0xa855f7, roughness: 0.2 });
        const cylinder = new THREE.Mesh(cylGeo, cylMat);
        cylinder.position.set(2, 2, 0);
        scene.add(cylinder);

        // --- STRUKTUR UNTUK TITIK TANGAN 3D ---
        // Membuat grup koordinat untuk menampung skeletal tangan kiri & kanan
        const handGroup = new THREE.Group();
        scene.add(handGroup);

        // --- SETUP MEDIAPIPE (Hand Tracking) ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            // Update Status Jumlah Tangan
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const jumlahTangan = results.multiHandLandmarks.length;
                statusText.innerText = `${jumlahTangan} TANGAN TERDETEKSI`;
                statusDot.className = "w-3 h-3 rounded-full bg-green-500 animate-pulse";
                
                // Di sini nanti ditambahkan logika untuk menggambar 21 titik 
                // dan garis neon di Three.js berdasarkan data `results.multiHandLandmarks`
            } else {
                statusText.innerText = "0 TANGAN TERDETEKSI";
                statusDot.className = "w-3 h-3 rounded-full bg-red-500 animate-pulse";
            }
        });

        // Menyalakan Kamera Webcam
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        // Animasi Loop Render 3D
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            cylinder.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // Responsive window
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
